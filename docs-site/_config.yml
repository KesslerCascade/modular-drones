title: Modular Drones
description: Documentation for the Modular Drones Minecraft mod
remote_theme: pages-themes/midnight@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-github-metadata

show_downloads: false

# Used to build absolute links within the site; GitHub Pages sets this
# automatically when served from a project page, but it's useful for
# local testing too. Update if the repo is renamed.
baseurl: "/modular-drones"

# Tells jekyll-github-metadata which repo to pull owner/repo info from
# (used for the "Project maintained by ..." footer line). Update this to
# the actual GitHub <owner>/<repo> once the site has a home there.
repository: KesslerCascade/modular-drones
